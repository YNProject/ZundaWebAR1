<div id="ui-layer">
    <div id="start-screen">
        <div class="info-box">
            <p>この画像をスキャンしよう！</p>
            <img src="img/SCkinako2.png" id="guide-img">
            <button id="start-button">スキャン開始なのだ！</button>
        </div>
    </div>
</div>

<a-scene 
    mindar-image="imageTargetSrc: ./img/targets.mind; autoStart: true; uiScanning: yes;" 
    embedded
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
        <img id="z0" src="img/ずんだもん立ち絵素材2_0000.png">
        </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="zunda-target" mindar-image-target="targetIndex: 0">
        <a-image class="zunda-frame" src="#z0" position="0 0 0.1" height="1.2" width="1" visible="false"></a-image>
        <a-image class="zunda-frame" src="#z1" position="0 0 0.1" height="1.2" width="1" visible="false"></a-image>
        <a-image class="zunda-frame" src="#z2" position="0 0 0.1" height="1.2" width="1" visible="false"></a-image>
        <a-image class="zunda-frame" src="#z3" position="0 0 0.1" height="1.2" width="1" visible="false"></a-image>
        <a-image class="zunda-frame" src="#z4" position="0 0 0.1" height="1.2" width="1" visible="false"></a-image>
        <a-image class="zunda-frame" src="#z5" position="0 0 0.1" height="1.2" width="1" visible="false"></a-image>
        <a-image class="zunda-frame" src="#z6" position="0 0 0.1" height="1.2" width="1" visible="false"></a-image>
        <a-image class="zunda-frame" src="#z7" position="0 0 0.1" height="1.2" width="1" visible="false"></a-image>
        <a-image class="zunda-frame" src="#z8" position="0 0 0.1" height="1.2" width="1" visible="false"></a-image>
    </a-entity>
</a-scene>
